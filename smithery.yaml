# Smithery configuration — https://smithery.ai/docs
# Local stdio server: Smithery lists supertone-mcp and runs it on the user's
# machine via `uvx supertone-mcp`. Users supply their Supertone API key (and an
# optional default voice) as session config.
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - supertoneApiKey
    properties:
      supertoneApiKey:
        type: string
        title: Supertone API Key
        description: Your Supertone API key (https://supertone.ai)
      voiceId:
        type: string
        title: Default Voice ID
        description: Optional default voice_id for text_to_speech / predict_duration
  commandFunction:
    |-
    (config) => ({
      command: 'uvx',
      args: ['supertone-mcp'],
      env: Object.assign(
        { SUPERTONE_API_KEY: config.supertoneApiKey },
        config.voiceId ? { SUPERTONE_MCP_VOICE_ID: config.voiceId } : {}
      )
    })
